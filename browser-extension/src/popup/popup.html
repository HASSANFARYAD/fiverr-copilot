<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header-icon {
      width: 28px;
      height: 28px;
      background: #6366f1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: bold;
      font-size: 12px;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .status { display: flex; align-items: center; gap: 6px; font-size: 13px; margin-bottom: 16px; padding: 8px 12px; background: #f9fafb; border-radius: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.ok { background: #22c55e; }
    .dot.err { background: #ef4444; }
    .dot.loading { background: #f59e0b; }
    .section { margin-bottom: 16px; }
    .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; margin-bottom: 8px; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-card { background: #f9fafb; border-radius: 8px; padding: 12px; text-align: center; }
    .stat-value { font-size: 24px; font-weight: 700; }
    .stat-value.green { color: #22c55e; }
    .stat-value.yellow { color: #f59e0b; }
    .stat-value.red { color: #ef4444; }
    .stat-label { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .footer { font-size: 12px; color: #9ca3af; text-align: center; margin-top: 8px; }
    .error { color: #ef4444; font-size: 13px; text-align: center; padding: 12px; }
    .loading-text { color: #6b7280; font-size: 13px; text-align: center; padding: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">FG</div>
    <h1>Fiverr Copilot</h1>
  </div>

  <div id="status" class="status">
    <span class="dot loading" id="statusDot"></span>
    <span id="statusText">Connecting...</span>
  </div>

  <div id="content">
    <div class="loading-text" id="loadingMsg">Loading dashboard...</div>
  </div>

  <div class="footer">Open Fiverr inbox to use the assistant.</div>

  <script src="popup.js"></script>
</body>
</html>
